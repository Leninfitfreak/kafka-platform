name: Kafka Platform Quality & Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-kafka-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config

      - name: Build Kafka image
        run: docker build -t leninkart/kafka-platform:ci .

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy config scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace aquasec/trivy:0.65.0 \
            config --severity CRITICAL --exit-code 0 .

      - name: Export image for Trivy scan
        run: docker save leninkart/kafka-platform:ci -o trivy-image.tar

      - name: Run Trivy image scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" aquasec/trivy:0.65.0 \
            image --input /workspace/trivy-image.tar --severity CRITICAL --ignore-unfixed --exit-code 0
