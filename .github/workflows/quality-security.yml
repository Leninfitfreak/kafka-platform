name: Kafka Platform Quality & Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-kafka-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docker-compose syntax
        run: docker compose -f docker-compose.yml config

      - name: Build Kafka image
        run: docker build -t leninkart/kafka-platform:ci .

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: leninkart/kafka-platform:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 0
